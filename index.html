<!DOCTYPE html>
<html lang="en">
<head>

    <script>
if (localStorage.getItem("isLoggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style/style.css">
    <title>GitHub Issues Tracker</title>

    <!-- Font Awesome cdn link -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- tailwind + daisy css -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Integration -->
       <link rel="preconnect" href="https://fonts.googleapis.com">
       <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#EAEEF2] min-h-screen">
    
    <!-- Navbar Section -->

    <nav class="bg-white border-b px-8 py-3 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2 font-bold text-lg text-gray-800">
            <div class="w-8 h-8 flex items-center justify-center">
                <img src="B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="Logo" class="w-full h-full object-contain">
            </div>
            <span>GitHub Issues Tracker</span>
        </div>

        <div class="flex items-center gap-2">
            <div class="relative w-full max-w-xs">
                <input type="text" id="searchInput" placeholder="Search issues..." class="bg-white px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 w-48 md:w-64"/>
            </div>
            <button onclick="handleSearch()" class="bg-[#4c00ff] text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-all">Search</button>
        </div>
    </nav>

    <script src="JavaScript/script.js"></script>
</body>
</html>
