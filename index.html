<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style/style.css">
    <title>GitHub Issues Tracker</title>

    <!-- Font Awesome cdn link -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- tailwind + daisy css -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Integration -->
       <link rel="preconnect" href="https://fonts.googleapis.com">
       <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#EAEEF2] min-h-screen">

    <!-- Navbar Section -->

    <nav class="bg-white border-b px-8 py-3 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2 font-bold text-lg text-gray-800">
            <div class="w-8 h-8 flex items-center justify-center">
                <img src="assets/github-logo.png" alt="Logo" class="w-full h-full object-contain">
            </div>
            <span>GitHub Issues Tracker</span>
        </div>

        <div class="flex items-center gap-2">
            <div class="relative w-full max-w-xs">
                <input type="text" id="searchInput" placeholder="Search issues..." class="bg-white px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 w-48 md:w-64"/>
            </div>
            <button onclick="handleSearch()" class="bg-[#4c00ff] text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-all">Search</button>
        </div>
    </nav>

       <!-- 2nd Banner Section -->

        <div class="max-w-7xl mx-auto py-10 px-4">
        <div class="flex gap-2 mb-8 bg-gray-200 p-1.5 rounded-xl w-fit">
            <button onclick="filterIssues('all', this)" class="btn btn-sm px-10 border-none tab-btn tab-active">All</button>
            <button onclick="filterIssues('open', this)" class="btn btn-sm px-10 border-none bg-transparent text-gray-500 tab-btn">Open</button>
            <button onclick="filterIssues('closed', this)" class="btn btn-sm px-10 border-none bg-transparent text-gray-500 tab-btn">Closed</button>
        </div>

        <div class="bg-white rounded-t-2xl border border-gray-200 p-8 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-5">
                <div class="bg-indigo-50 p-1 rounded-2xl overflow-hidden w-12 h-12 flex items-center justify-center">
                    <img src="assets/Aperture.png" class="w-full h-full object-cover rounded-xl" alt="Logo">
                </div>
                <div>
                    <h2 id="issueStats" class="text-2xl font-black text-gray-800">0 Issues</h2>
                    <p class="text-sm text-gray-400">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-6 text-sm font-bold">
                <span class="flex items-center gap-2"><span><img src="assets/Open-Status.png" alt=""></span> Open</span>
                <span class="flex items-center gap-2"><span><img src="assets/Closed- Status .png" alt=""></span> Closed</span>
            </div>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-6">
            <div class="col-span-full text-center py-10 text-gray-400">Loading issues...</div>
        </div>
    </div>

        <!-- Modal Section -->

    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box max-w-lg p-0 bg-white rounded-3xl overflow-hidden shadow-2xl relative">
            <div id="details-container"></div>
            <div class="p-5 bg-gray-50 flex justify-end border-t border-gray-100">
                <form method="dialog">
                    <button class="btn btn-md bg-[#4c00ff] border-none text-white px-10 rounded-xl hover:bg-indigo-700 capitalize transition-all">Close</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>


    <script src="JavaScript/script.js"></script>
</body>
</html>
