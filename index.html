<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style/style.css">
    <!-- Font Awesome cdn link -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- tailwind + daisy css -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Integration -->
       <link rel="preconnect" href="https://fonts.googleapis.com">
       <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title>Login | GitHub Issues Tracker</title>
    

</head>
<body class="bg-[#F3F4F6] min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[480px] bg-white p-10 rounded-2xl shadow-sm border border-gray-100">
        
        <div class="text-center mb-8">
            <i class="fa-brands fa-github text-7xl text-gray-800 mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">GitHub Issues Tracker</h1>
            <p class="text-gray-500 mt-2">Sign in to manage your issues</p>
        </div>

        <form id="loginForm">
            <div class="mb-5">
                <label class="block text-gray-700 font-semibold mb-2">Username</label>
                <input type="text" id="username" placeholder="Enter Username" 
                    class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <p class="text-xs text-indigo-600 mt-2 font-medium">Default: admin</p>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2">Password</label>
                <input type="password" id="password" placeholder="Enter Password" 
                    class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <p class="text-xs text-indigo-600 mt-2 font-medium">Default: admin123</p>
            </div>

            <button type="submit" 
                class="w-full bg-[#4F46E5] hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-colors text-lg">
                Sign In
            </button>
        </form>

        <div class="relative flex items-center my-8">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink mx-4 text-gray-400 text-sm font-medium">OR</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <div class="text-center">
            <p class="text-sm text-gray-500 mb-3">Demo Credentials:</p>
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 inline-block w-full">
                <p class="text-gray-700 text-sm">
                    <span class="font-bold">Username:</span> admin <br>
                    <span class="font-bold">Password:</span> admin123
                </p>
            </div>
        </div>
    </div>

<script src="JavaScript/login.js"></script>
</body>
</html>
